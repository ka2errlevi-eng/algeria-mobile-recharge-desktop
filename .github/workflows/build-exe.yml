name: Build Windows EXE

on:
  push:
    branches: [ main ]
    paths:
      - 'Program.cs'
      - 'AlgeriaMobileRechargeDesktop.csproj'
      - '.github/workflows/build-exe.yml'

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release (Windows x64)
        run: dotnet publish -c Release -r win-x64 --self-contained true

      - name: Upload EXE as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Release-artifacts
          path: |
            ./bin/Release/net6.0-windows/win-x64/publish/**

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Auto‑built Windows EXE for Algeria Mobile Recharge.

      - name: Upload EXE to Release
        uses: actions/upload-release-asset@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./bin/Release/net6.0-windows/win-x64/publish/AlgeriaMobileRechargeDesktop.exe
          asset_name: AlgeriaMobileRechargeDesktop.exe
          asset_content_type: application/x-msdownload
